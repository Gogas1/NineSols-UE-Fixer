[config]
schemaVersion = "0.0.1"

[package]
namespace = "gogas1"
name = "UnityExplorer-Fixer"
versionNumber = "0.1.0"
description = "Fixes unity explorer dying after exiting to the main menu"
websiteUrl = "https://github.com/Gogas1/UnityExplorer-Fixer"
containsNsfwContent = false

[package.dependencies]
"BepInEx-BepInExPack" = "5.4.2100"
"ninesolsmodding-NineSolsAPI" = "0.0.2"
"ninesolsmodding-UnityExplorer" = "0.2.0"

[build]
icon = "./icon.png"
readme = "./README.md"
outdir = "./build"

[[build.copy]]
source = "build/dll"
target = "."

[publish]
repository = "https://thunderstore.io"
communities = [ "nine-sols" ]
